name: SwinIR
model_type: SRModel
scale: 1
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1:  # the 1st test dataset
    name: Set5
    type: PairedImageDataset
    dataroot_gt: datasets/DLFSI/test_9/set5/label
    dataroot_lq: datasets/DLFSI/test_9/set5/input
    io_backend:
      type: disk
  test_2:  # the 2nd test dataset
    name: Set12
    type: PairedImageDataset
    dataroot_gt: datasets/DLFSI/test_9/set12/label
    dataroot_lq: datasets/DLFSI/test_9/set12/input
    io_backend:
      type: disk
  test_3:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: datasets/DLFSI/test_9/set14/label
    dataroot_lq: datasets/DLFSI/test_9/set14/input
    io_backend:
      type: disk
  test_4:
    name: BSD100
    type: PairedImageDataset
    dataroot_gt: datasets/DLFSI/test_9/BSD100/label
    dataroot_lq: datasets/DLFSI/test_9/BSD100/input
    io_backend:
      type: disk
  test_5:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: datasets/DLFSI/test_9/Urban100/label
    dataroot_lq: datasets/DLFSI/test_9/Urban100/input
    io_backend:
      type: disk
  test_6:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: datasets/DLFSI/test_9/Manga109/label
    dataroot_lq: datasets/DLFSI/test_9/Manga109/input
    io_backend:
      type: disk

# network structures
network_g:
  type: SwinIR
  upscale: 1
  in_chans: 3
  img_size: 128
  window_size: 8
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: ''
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: experiments/pretrained_models/005_colorDN_DFWB_s128w8_SwinIR-M_noise15.pth
  strict_load_g: true

# validation settings
val:
  save_img: false
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: false
